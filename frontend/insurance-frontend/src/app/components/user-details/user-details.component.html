<div class="details-page">
  <section class="details-card">
    <p class="eyebrow">User profile</p>
    <h2>{{ userGreeting }}</h2>
    <p class="subtext">Welcome back! Here are the details for the user currently logged in.</p>

    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success">{{ successMessage }}</div>

    <!-- Profile Photo Section -->
    <div class="profile-avatar-section">
  <div class="profile-avatar">
    {{ profileInitials }}
  </div>
</div>

    <!-- User Info Grid -->
    <div class="info-grid" *ngIf="!isLoading">
      <div class="info-block">
        <span>Role</span>
        <strong>{{ displayRole }}</strong>
      </div>
      <div class="info-block">
        <span>Email</span>
        <strong>{{ userEmail }}</strong>
      </div>
      <div class="info-block">
        <span>Status</span>
        <strong>{{ userStatus }}</strong>
      </div>
    </div>

    <a routerLink="/dashboard" class="primary-button">Go to dashboard</a>
  </section>
</div>
